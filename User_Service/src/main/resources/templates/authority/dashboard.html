<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Authority Dashboard</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="navbar">
    <div>
        <div class="nav-title">Authority Dashboard</div>
    </div>
    <div>
        <span th:text="${me.email}" style="color:#bbb; font-size:12px;"></span>
        <a href="/authority/profile/edit">Edit Profile</a>
        <form method="post" th:action="@{/logout}" style="display:inline; margin-left:10px;">
            <button class="btn btn-danger" type="submit">Logout</button>
        </form>
    </div>
</div>

<div class="content">


    <h3>Citizens (<span th:text="${#lists.size(citizens)}">0</span>)</h3>
    <table>
        <tr><th>Name</th><th>Email</th><th>City</th><th>Status</th><th>Actions</th></tr>
        <tr th:if="${#lists.isEmpty(citizens)}"><td colspan="5">No citizens.</td></tr>
        <tr th:each="u : ${citizens}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.city != null ? u.city : '-'}"></td>
            <td th:text="${u.active ? 'Active' : 'Inactive'}"></td>
            <td>
                <a th:href="@{/authority/users/{id}(id=${u.userId})}" class="btn btn-primary">View</a>
                <form style="display:inline" method="post"
                      th:action="@{/authority/users/{id}/deactivate(id=${u.userId})}">
                    <button class="btn btn-warning" th:if="${u.active}"
                            onclick="return confirm('Deactivate?')">Deactivate</button>
                </form>
                <form style="display:inline" method="post"
                      th:action="@{/authority/users/{id}/delete(id=${u.userId})}">
                    <button class="btn btn-danger"
                            onclick="return confirm('Delete permanently?')">Delete</button>
                </form>
            </td>
        </tr>
    </table>

    <h3>Authorities (<span th:text="${#lists.size(authorities)}">0</span>)</h3>
    <table>
        <tr><th>Name</th><th>Email</th><th>City</th><th>Status</th><th>Actions</th></tr>
        <tr th:if="${#lists.isEmpty(authorities)}"><td colspan="5">No authorities.</td></tr>
        <tr th:each="u : ${authorities}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.city != null ? u.city : '-'}"></td>
            <td th:text="${u.active ? 'Active' : 'Inactive'}"></td>
            <td>
                <a th:href="@{/authority/users/{id}(id=${u.userId})}" class="btn btn-primary">View</a>
                <form style="display:inline" method="post"
                      th:action="@{/authority/users/{id}/delete(id=${u.userId})}">
                    <button class="btn btn-danger" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </td>
        </tr>
    </table>

    <h3>Technicians (<span th:text="${#lists.size(technicians)}">0</span>)</h3>
    <table>
        <tr><th>Name</th><th>Email</th><th>Specialization</th><th>District</th><th>Status</th><th>Actions</th></tr>
        <tr th:if="${#lists.isEmpty(technicians)}"><td colspan="6">No technicians.</td></tr>
        <tr th:each="u : ${technicians}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.specialization != null ? u.specialization : '-'}"></td>
            <td th:text="${u.district != null ? u.district : '-'}"></td>
            <td th:text="${u.active ? 'Active' : 'Inactive'}"></td>
            <td>
                <a th:href="@{/authority/users/{id}(id=${u.userId})}" class="btn btn-primary">View</a>
                <form style="display:inline" method="post"
                      th:action="@{/authority/users/{id}/delete(id=${u.userId})}">
                    <button class="btn btn-danger" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
