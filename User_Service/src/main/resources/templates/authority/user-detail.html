<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Detail</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="navbar">
    <div><div class="nav-title">User Detail</div></div>
    <div><a href="/authority/dashboard">Back</a></div>
</div>

<div class="content">
    <h2 th:text="${user.fullName}">User Name</h2>

    <table class="detail-table" style="width:auto;">
        <tr><th>Role</th><td th:text="${user.role}"></td></tr>
        <tr><th>Email</th><td th:text="${user.email}"></td></tr>
        <tr><th>Phone</th><td th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}"></td></tr>
        <tr><th>City</th><td th:text="${user.city != null ? user.city : '-'}"></td></tr>
        <tr><th>Status</th><td th:text="${user.active ? 'Active' : 'Inactive'}"></td></tr>
        <tr th:if="${user.role.name() == 'TECHNICIAN'}">
            <th>Specialization</th>
            <td th:text="${user.specialization != null ? user.specialization : '-'}"></td>
        </tr>
        <tr th:if="${user.role.name() == 'TECHNICIAN'}">
            <th>District</th>
            <td th:text="${user.district != null ? user.district : '-'}"></td>
        </tr>
    </table>

    <div class="form-actions" style="margin-top:16px;">
        <form style="display:inline" method="post"
              th:action="@{/authority/users/{id}/deactivate(id=${user.userId})}">
            <button class="btn btn-warning" th:if="${user.active}"
                    onclick="return confirm('Deactivate?')">Deactivate</button>
        </form>
        <form style="display:inline" method="post"
              th:action="@{/authority/users/{id}/delete(id=${user.userId})}">
            <button class="btn btn-danger"
                    onclick="return confirm('Delete permanently?')">Delete</button>
        </form>
        <a href="/authority/dashboard" class="btn btn-default">Back</a>
    </div>
</div>
</body>
</html>
