<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <script>
        function showTech(val) {
            document.getElementById('techFields').style.display =
                val === 'TECHNICIAN' ? 'block' : 'none';
        }
    </script>
</head>
<body>
<div class="auth-wrap">
<div class="auth-card">
    <h2>Create Account</h2>
    <p class="sub">Road Condition Monitoring</p>

    <div th:if="${error}" class="msg-error" th:text="${error}"></div>

    <form method="post" th:action="@{/register/save}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName" required/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="min 6 characters" required/>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role" required onchange="showTech(this.value)">
                <option value="">-- Select role --</option>
                <option value="CITIZEN">CITIZEN</option>
                <option value="AUTHORITY">AUTHORITY</option>
                <option value="TECHNICIAN">TECHNICIAN</option>
            </select>
        </div>
        <div class="form-group">
            <label>Phone (optional)</label>
            <input type="text" name="phoneNumber"/>
        </div>
        <div class="form-group">
            <label>City (optional)</label>
            <input type="text" name="city"/>
        </div>
        <div id="techFields" style="display:none" class="tech-box">
            <b>Technician extra fields</b>
            <div class="form-group">
                <label>Specialization</label>
                <select name="specialization">
                    <option value="">-- Select --</option>
                    <option value="Road Repair">Road Repair</option>
                    <option value="Traffic Lights">Traffic Lights</option>
                    <option value="Signage">Signage</option>
                    <option value="Drainage">Drainage</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div class="form-group">
                <label>District</label>
                <input type="text" name="district"/>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <div class="bottom">Already have an account? <a href="/login">Login here</a></div>
</div>
</div>
</body>
</html>
