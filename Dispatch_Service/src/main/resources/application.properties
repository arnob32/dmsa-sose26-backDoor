spring.application.name=dispatch-service
server.port=8081

spring.datasource.url=jdbc:h2:mem:dispatchdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

# Eureka service discovery.
# Disabled by default so the service runs standalone for Assignment 5 Task 1.
# For Task 2 (integration): start the eureka-server module, then set this to true.
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
