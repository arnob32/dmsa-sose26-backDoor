spring.application.name=dispatch-service
server.port=8081

# Spring Cloud Config client (Task 2): pull centralized config from the config-server
# on port 8888. "optional:" lets the service still start if the config server is down.
spring.config.import=optional:configserver:http://localhost:8888

spring.datasource.url=jdbc:h2:mem:dispatchdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

# Eureka service discovery (Task 2 integration).
# Requires the eureka-server module to be running on port 8761.
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Resilience4j circuit breaker for the outbound call to user-service (Task 2).
resilience4j.circuitbreaker.instances.userService.sliding-window-size=5
resilience4j.circuitbreaker.instances.userService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.userService.register-health-indicator=true

# Actuator: expose health (incl. circuit-breaker state) and circuitbreaker events.
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
